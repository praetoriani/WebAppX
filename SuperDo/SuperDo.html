<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperDo – Task Manager</title>
<!-- Version: v1.00.01 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fbfbf9;--surface-off:#ede9e3;--surface-dyn:#e4e0d9;
  --border:rgba(40,37,29,0.12);--divider:rgba(40,37,29,0.08);
  --text:#28251d;--text-muted:#6b6860;--text-faint:#b0afa9;--text-inv:#f5f4f0;
  --primary:#01696f;--primary-h:#0c4e54;--primary-hl:#ced8d7;
  --error:#a12c7b;--error-hl:#e8d0dd;
  --warn:#964219;--warn-hl:#ded0c8;
  --success:#437a22;--success-hl:#d3dfcc;
  --orange:#da7101;--orange-hl:#e8d9c5;
  --purple:#7a39bb;--purple-hl:#dbd0e0;
  --shadow-sm:0 1px 3px rgba(40,37,29,.07);
  --shadow-md:0 4px 14px rgba(40,37,29,.09);
  --shadow-lg:0 12px 36px rgba(40,37,29,.13);
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --tr:180ms cubic-bezier(.16,1,.3,1);
  --sidebar-width:260px;
}
[data-theme="dark"]{
  --bg:#121110;--surface:#181715;--surface-2:#1d1c1a;--surface-off:#1a1917;--surface-dyn:#252321;
  --border:rgba(255,255,255,.08);--divider:rgba(255,255,255,.05);
  --text:#cccbc8;--text-muted:#787673;--text-faint:#525150;--text-inv:#1a1917;
  --primary:#4f9aa5;--primary-h:#227f8b;--primary-hl:#2a3b3c;
  --error:#d163a7;--error-hl:#4a3244;
  --warn:#bb653b;--warn-hl:#52403a;
  --success:#6daa45;--success-hl:#334335;
  --orange:#fdab43;--orange-hl:#4e3d2f;
  --purple:#a86fdf;--purple-hl:#3f3249;
  --shadow-sm:0 1px 3px rgba(0,0,0,.25);
  --shadow-md:0 4px 14px rgba(0,0,0,.35);
  --shadow-lg:0 12px 36px rgba(0,0,0,.45);
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--font-body);font-size:14px;color:var(--text);background:var(--bg);min-height:100dvh;line-height:1.6;display:flex;flex-direction:column;overflow:hidden}
button,input,select{font:inherit;color:inherit;cursor:pointer}
button{background:none;border:none}

/* ============ APP SHELL ============ */
.app-shell{display:flex;flex:1;height:100dvh;overflow:hidden;position:relative}

/* ============ SIDEBAR ============ */
.sidebar{
  width:var(--sidebar-width);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  transform:translateX(0);
  transition:transform 320ms cubic-bezier(.16,1,.3,1), width 320ms cubic-bezier(.16,1,.3,1);
  overflow:hidden;
  z-index:200;
  position:relative;
}
.sidebar.collapsed{
  transform:translateX(calc(-1 * var(--sidebar-width)));
  width:0;
}
.sidebar-header{
  padding:1rem 1.125rem .75rem;
  display:flex;
  align-items:center;
  gap:.625rem;
  border-bottom:1px solid var(--divider);
  flex-shrink:0;
}
.sidebar-logo{
  display:flex;
  align-items:center;
  gap:.5rem;
  flex:1;
  text-decoration:none;
}
.sidebar-logo-icon{width:28px;height:28px;flex-shrink:0}
.sidebar-logo-text{font-family:var(--font-mono);font-size:.9rem;font-weight:700;color:var(--text);letter-spacing:-.02em;white-space:nowrap}
.sidebar-logo-text span{color:var(--primary)}
.sidebar-nav{
  flex:1;
  overflow-y:auto;
  padding:.5rem 0;
}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-track{background:transparent}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-section-label{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text-faint);
  padding:.5rem 1.125rem .25rem;
  margin-top:.25rem;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:.625rem;
  padding:.5rem 1.125rem;
  font-size:13px;
  font-weight:500;
  color:var(--text-muted);
  border-radius:0;
  width:100%;
  text-align:left;
  transition:background var(--tr),color var(--tr);
  cursor:pointer;
  border:none;
  background:none;
}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item:hover{background:var(--surface-dyn);color:var(--text)}
.nav-item.active{background:color-mix(in oklab,var(--primary) 12%,transparent);color:var(--primary);font-weight:600}
.nav-item.active svg{opacity:1}
.sidebar-footer{
  padding:.75rem 1.125rem;
  border-top:1px solid var(--divider);
  font-size:11px;
  color:var(--text-faint);
  flex-shrink:0;
}
.sidebar-version{font-family:var(--font-mono)}

/* ============ MAIN CONTENT AREA ============ */
.content-area{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
  transition:margin-left 320ms cubic-bezier(.16,1,.3,1);
}

/* ============ HEADER ============ */
.header{
  position:relative;
  z-index:100;
  background:color-mix(in oklab,var(--bg) 88%,transparent);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:.75rem 1.25rem;
  display:flex;
  align-items:center;
  gap:.875rem;
  flex-shrink:0;
}
.btn-sidebar-toggle{
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:var(--r-md);
  color:var(--text-muted);
  transition:background var(--tr),color var(--tr);
  flex-shrink:0;
}
.btn-sidebar-toggle:hover{background:var(--surface-dyn);color:var(--text)}
.header-title{
  font-family:var(--font-mono);
  font-size:.875rem;
  font-weight:700;
  color:var(--text);
  flex-shrink:0;
  display:none;
}
@media(max-width:500px){.header-title{display:block}}
.header-center{flex:1;min-width:0}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:.625rem;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none;width:15px;height:15px}
.search{width:100%;max-width:360px;padding:.4rem .75rem .4rem 2rem;background:var(--surface-off);border:1px solid var(--border);border-radius:var(--r-full);font-size:13px;color:var(--text);transition:border-color var(--tr),box-shadow var(--tr);outline:none}
.search:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in oklab,var(--primary) 18%,transparent)}
.search::placeholder{color:var(--text-faint)}
.header-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);color:var(--text-muted);transition:background var(--tr),color var(--tr)}
.btn-icon:hover{background:var(--surface-dyn);color:var(--text)}
.btn-export{padding:.4rem .875rem;background:var(--primary);color:#fff;border-radius:var(--r-md);font-size:12px;font-weight:600;transition:background var(--tr);white-space:nowrap}
.btn-export:hover{background:var(--primary-h)}

/* ============ SCROLLABLE BODY ============ */
.page-body{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding-bottom:3rem;
}
.page-body::-webkit-scrollbar{width:5px}
.page-body::-webkit-scrollbar-track{background:transparent}
.page-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ============ VIEWS ============ */
.view{display:none;animation:fadeIn 200ms ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ============ FILTERS ============ */
.filters{padding:.625rem 1.25rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;border-bottom:1px solid var(--divider)}
.filter-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);margin-right:.25rem}
.filter-btn{padding:.3rem .625rem;border-radius:var(--r-full);border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text-muted);background:var(--surface);transition:all var(--tr)}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.filter-sep{width:1px;height:18px;background:var(--divider);margin:0 .25rem}

/* ============ MAIN TASK LIST ============ */
.main{padding:1.125rem 1.25rem;max-width:1400px;margin:0 auto}
.phases-grid{display:flex;flex-direction:column;gap:1rem}

/* PHASE CARD */
.phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow var(--tr)}
.phase-card:hover{box-shadow:var(--shadow-md)}
.phase-header{padding:.875rem 1.125rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;user-select:none;transition:background var(--tr)}
.phase-header:hover{background:var(--surface-dyn)}
.phase-toggle{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);flex-shrink:0;transition:transform var(--tr)}
.phase-card.collapsed .phase-toggle{transform:rotate(-90deg)}
.phase-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:.2rem .5rem;border-radius:var(--r-sm);background:var(--primary-hl);color:var(--primary);flex-shrink:0}
.phase-title{font-size:14px;font-weight:600;flex:1}
.phase-meta{display:flex;align-items:center;gap:.625rem;flex-shrink:0}
.phase-progress{font-size:11px;font-weight:600;font-family:var(--font-mono);color:var(--text-muted)}
.phase-mini-bar{width:64px;height:4px;background:var(--surface-off);border-radius:var(--r-full);overflow:hidden}
.phase-mini-fill{height:100%;background:var(--primary);border-radius:var(--r-full);transition:width .4s ease}
.phase-body{border-top:1px solid var(--divider)}
.phase-card.collapsed .phase-body{display:none}

/* TODO TABLE */
.todo-table{width:100%;border-collapse:collapse}
.todo-table th{padding:.5rem 1rem;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);border-bottom:1px solid var(--divider);background:var(--surface-off)}
.todo-table th:first-child{padding-left:1.125rem;width:44px}
.todo-table td{padding:.6rem 1rem;border-bottom:1px solid var(--divider);vertical-align:middle;font-size:13px}
.todo-table td:first-child{padding-left:1.125rem}
.todo-table tr:last-child td{border-bottom:none}
.todo-table tr{transition:background var(--tr)}
.todo-table tr:hover td{background:var(--surface-2)}
.todo-table tr.done td{opacity:.45}
.todo-table tr.hidden-row{display:none}

/* CHECKBOX */
.cb-wrap{display:flex;align-items:center;justify-content:center}
.cb{width:18px;height:18px;border-radius:var(--r-sm);border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr);flex-shrink:0;background:var(--surface)}
.cb:hover{border-color:var(--primary)}
.cb.checked{background:var(--primary);border-color:var(--primary)}
.cb.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}

/* TASK ID */
.task-id{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);white-space:nowrap}

/* PRIORITY BADGE */
.prio{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .5rem;border-radius:var(--r-full);font-size:11px;font-weight:600;white-space:nowrap}
.prio-dot{width:6px;height:6px;border-radius:50%}
.prio.critical{background:var(--error-hl);color:var(--error)}
.prio.high{background:var(--warn-hl);color:var(--warn)}
.prio.medium{background:var(--orange-hl);color:var(--orange)}
.prio.low{background:var(--success-hl);color:var(--success)}

/* CATEGORY BADGE */
.cat{display:inline-flex;padding:.18rem .5rem;border-radius:var(--r-full);font-size:11px;font-weight:500;border:1px solid var(--border);color:var(--text-muted);white-space:nowrap}

/* TASK NAME / DESC */
.task-name{font-weight:600;color:var(--text);font-size:13px;line-height:1.3;margin-bottom:.15rem}
.task-desc{font-size:12px;color:var(--text-muted);line-height:1.4;max-width:60ch}

/* EMPTY STATE */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
.empty-state svg{width:40px;height:40px;margin:0 auto .75rem;color:var(--text-faint)}
.empty-state h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:.25rem}
.empty-state p{font-size:13px}

/* ============ DASHBOARD VIEW ============ */
.dashboard{
  padding:1.25rem 1.25rem;
  max-width:1200px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:1.5rem;
}
.dash-heading{
  font-size:1.125rem;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.02em;
}
.dash-subheading{
  font-size:12px;
  color:var(--text-muted);
  margin-top:.2rem;
}
.dash-section-title{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--text-faint);
  margin-bottom:.75rem;
}

/* Overall progress card */
.dash-progress-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:1.25rem 1.5rem;
  display:flex;
  align-items:center;
  gap:2rem;
  flex-wrap:wrap;
}
.dash-pct-ring{
  position:relative;
  width:80px;
  height:80px;
  flex-shrink:0;
}
.dash-pct-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.dash-pct-ring .ring-bg{fill:none;stroke:var(--surface-off);stroke-width:7}
.dash-pct-ring .ring-fill{fill:none;stroke:var(--primary);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.16,1,.3,1)}
.dash-pct-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:1rem;font-weight:700;color:var(--primary)}
.dash-progress-info{flex:1}
.dash-progress-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:.2rem}
.dash-progress-sub{font-size:12px;color:var(--text-muted)}
.dash-progress-bar-wrap{margin-top:.625rem;height:6px;background:var(--surface-off);border-radius:var(--r-full);overflow:hidden}
.dash-progress-bar-fill{height:100%;background:var(--primary);border-radius:var(--r-full);transition:width .5s ease}

/* Stat cards grid */
.dash-cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:.75rem;
}
.dash-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:1rem 1.125rem;
  display:flex;
  flex-direction:column;
  gap:.25rem;
  transition:box-shadow var(--tr),border-color var(--tr);
}
.dash-card:hover{box-shadow:var(--shadow-md);border-color:color-mix(in oklab,var(--primary) 25%,var(--border))}
.dash-card-icon{
  width:32px;
  height:32px;
  border-radius:var(--r-md);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:.5rem;
}
.dash-card-icon svg{width:16px;height:16px}
.dash-card-value{
  font-family:var(--font-mono);
  font-size:1.5rem;
  font-weight:700;
  line-height:1;
}
.dash-card-label{
  font-size:11px;
  color:var(--text-muted);
  font-weight:500;
}
.dash-card-sub{
  font-size:10px;
  color:var(--text-faint);
  margin-top:.1rem;
}

/* Category breakdown */
.dash-cat-grid{
  display:flex;
  flex-direction:column;
  gap:.5rem;
}
.dash-cat-row{
  display:flex;
  align-items:center;
  gap:.75rem;
  padding:.5rem .75rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
}
.dash-cat-label{
  font-size:12px;
  font-weight:500;
  color:var(--text);
  min-width:110px;
  flex-shrink:0;
}
.dash-cat-bar-wrap{
  flex:1;
  height:5px;
  background:var(--surface-off);
  border-radius:var(--r-full);
  overflow:hidden;
}
.dash-cat-bar-fill{
  height:100%;
  background:var(--primary);
  border-radius:var(--r-full);
  transition:width .5s ease;
}
.dash-cat-count{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:600;
  color:var(--text-muted);
  min-width:40px;
  text-align:right;
  flex-shrink:0;
}
.dash-cat-done{
  font-size:10px;
  color:var(--text-faint);
  min-width:30px;
  text-align:right;
  flex-shrink:0;
}

/* ============ STATUS BAR (bottom) ============ */
.status-bar{
  flex-shrink:0;
  height:36px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 1rem;
  gap:.875rem;
  overflow:hidden;
  font-size:11px;
  z-index:50;
}
.status-bar-left{
  display:flex;
  align-items:center;
  gap:.875rem;
  flex:1;
  min-width:0;
  overflow:hidden;
}
.status-pill{
  display:flex;
  align-items:center;
  gap:.35rem;
  white-space:nowrap;
  color:var(--text-muted);
  font-weight:500;
}
.status-pill .sdot{
  width:6px;
  height:6px;
  border-radius:50%;
  flex-shrink:0;
}
.status-bar-progress{
  display:flex;
  align-items:center;
  gap:.5rem;
  flex-shrink:0;
}
.status-bar-progress-track{
  width:100px;
  height:4px;
  background:var(--surface-off);
  border-radius:var(--r-full);
  overflow:hidden;
}
.status-bar-progress-fill{
  height:100%;
  background:var(--primary);
  border-radius:var(--r-full);
  transition:width .4s ease;
}
.status-bar-pct{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:700;
  color:var(--primary);
  min-width:2.5rem;
}
.status-bar-done{
  font-size:11px;
  color:var(--text-muted);
  font-family:var(--font-mono);
  white-space:nowrap;
}

/* Mobile sidebar overlay */
@media(max-width:768px){
  .sidebar{
    position:absolute;
    top:0;
    left:0;
    height:100%;
    box-shadow:var(--shadow-lg);
  }
  .sidebar-overlay{
    display:none;
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.4);
    z-index:190;
  }
  .sidebar-overlay.visible{display:block}
  .todo-table th:nth-child(4),.todo-table td:nth-child(4),
  .todo-table th:nth-child(5),.todo-table td:nth-child(5){display:none}
  .task-desc{display:none}
  .header{padding:.625rem 1rem;gap:.625rem}
  .filters{padding:.625rem 1rem}
  .main{padding:.875rem 1rem}
  .dashboard{padding:1rem}
  .status-pill:nth-child(n+4){display:none}
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Hauptnavigation">
    <div class="sidebar-header">
      <a class="sidebar-logo" href="#">
        <svg class="sidebar-logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="var(--primary)"/>
          <path d="M16 6C16 6 10 12 10 18C10 21.314 12.686 24 16 24C19.314 24 22 21.314 22 18C22 12 16 6 16 6Z" fill="white" opacity="0.9"/>
          <circle cx="16" cy="18" r="3" fill="var(--primary)"/>
          <path d="M13 25L11 29M19 25L21 29" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <span class="sidebar-logo-text">Super<span>Do</span></span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Übersicht</span>
      <button class="nav-item active" data-view="tasks" id="nav-tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Aufgaben

nal, Set: Run)", "Standardmäßig false; wenn gesetzt, wird kein Logfile erstellt", "medium", "params"], ["P2-05", "-AddProfile [switch] implementieren (Set: AddProfile)", "Nur gültig zusammen mit -NewProfileID; Prüfung via ParameterSet-Binding", "high", "params"], ["P2-06", "-NewProfileID [string] implementieren (Set: AddProfile)", "Validierungsregex: ^[a-zA-Z0-9_-]{1,50}$ — keine Leerzeichen, keine Sonderzeichen außer - und _", "high", "params"], ["P2-07", "-DelProfile [string] implementieren (Optional, Set: DelProfile)", "Prüfung ob Profil in profiledb.conf UND als .ps1-Datei existiert; kein Confirm-Dialog (by design)", "high", "params"], ["P2-08", "Zukünftige Parameter als Platzhalter definieren", "-Backup, -BackupDir, -Restore, -RestoreFile als Parameter-Platzhalter mit Write-Warning 'Not yet implemented'", "low", "params"], ["P2-09", "Parametervalidierung zentralisieren", "Funktion Invoke-PSARParameterValidation in psapp.validation.ps1 — alle Checks an einem Ort", "high", "params"]], "Phase 3: Profil-Management": [["P3-01", "Funktion New-PSARProfile implementieren", "Erstellt neues Profil: Validierung NewProfileID, Prüfung Duplikat in profiledb.conf (case-insensitiv), Template-Datei erzeugen, profiledb.conf aktualisieren", "critical", "profile"], ["P3-02", "Profil-Template-Datei definieren und implementieren", "Template enthält: PSCustomObject-Array $AppLoader, 3 auskommentierte Beispieleinträge mit allen Feldern, ausführliche Inline-Kommentare auf Englisch", "critical", "profile"], ["P3-03", "Profil-Dateiformat von String-Array auf PSCustomObject-Array migrieren", "Format: [PSCustomObject]@{ProgramName=''; ExePath=''; RunAs='AsUser'; WindowStyle='Normal'; WaitMillisecs=0}", "critical", "profile"], ["P3-04", "Funktion Remove-PSARProfile implementieren", "Prüft Existenz in profiledb.conf + Datei, löscht beides ohne Rückfrage, gibt PSARreturn zurück", "high", "profile"], ["P3-05", "Funktion Get-PSARProfile implementieren", "Lädt eine Profildatei, validiert die Str igh", "launcher"], ["P4-06", "WaitMillisecs-Logik implementieren", "Start-Sleep -Milliseconds $entry.WaitMillisecs; 0 = kein Warten; 100er-Schritte validiert", "medium", "launcher"], ["P4-07", "Fehlerbehandlung pro Programm-Eintrag implementieren", "Try/Catch je Eintrag; bei Fehler: loggen, weitermachen (nicht abbrechen), am Ende Fehlerzusammenfassung", "critical", "launcher"], ["P4-08", "Fortschritts-Event-System implementieren (für GUI/Console/Taskbar)", "Write-Progress + Custom-Event-System: $PSAR_ProgressEvent; UI-Module subscriben; entkoppelt von Launcher-Logik", "high", "launcher"], ["P4-09", "Exe-Only-Validierung implementieren", "Vor jedem Start: [System.IO.Path]::GetExtension($entry.ExePath) -eq '.exe' — sonst überspringen + warnen", "critical", "launcher"]], "Phase 5: Logging-System": [["P5-01", "Funktion Write-PSARLog implementieren", "Schreibt in aktuelle Logdatei: Timestamp, Severity (INFO/WARN/ERROR), Message; Thread-safe via Mutex", "critical", "logging"], ["P5-02", "Logdatei-Namensschema implementieren", "YYYYMMDD-HHMMSS.log via Get-Date -Format 'yyyyMMdd-HHmmss'; eine neue Datei pro Programmausführung", "high", "logging"], ["P5-03", "Log-Rotation implementieren (max. 50 Dateien)", "Vor Start: Alle .log-Dateien zählen, wenn >50 → älteste (Sort-Object LastWriteTime) löschen bis <=49", "high", "logging"], ["P5-04", "NoLogs-Switch in Logging-System integrieren", "Wenn $NoLogs=$true → Write-PSARLog ist ein No-Op (schreibt nichts); Logdatei wird nicht erstellt", "medium", "logging"], ["P5-05", "Log-Level-System implementieren", "VERBOSE, INFO, WARN, ERROR, FATAL; konfigurierbar über settings\\psapp.settings.conf", "medium", "logging"], ["P5-06", "Session-Start und Session-End im Log erfassen", "Beim Start: Version, Modus, ProfilID, Timestamp; beim Ende: Erfolg/Fehler-Zusammenfassung, Dauer", "high", "logging"]], "Phase 6: GUI-Modi": [["P6-01", "Mode 'Hidden' implementieren", "Kein Fenster, keine Ausgabe; nur Logging; einfachste Implementierung, zuerst umsetzen", "critical", "gui"], ["P6-02", "Mode 'Console' implementieren (Custom-Console-GUI)", "WPF-Fenster das eine Konsole simuliert: Scrollbare TextBox, Monospace-Font, dunkel; Updates via Dispatcher", "high", "gui"], ["P6-03", "Mode 'GUI' implementieren (Fortschrittsfenster)", "WPF-Fenster mit ProgressBar, aktuellem Programmnamen, Status-Label; Runspace für nicht-blockierende UI", "high", "gui"], ["P6-04", "Mode 'Taskbar' implementieren (System Tray Icon)", "NotifyIcon via System.Windows.Forms; Icon anzeigen solange aktiv; Tooltip mit Fortschritt", "medium", "gui"], ["P6-05", "WPF-Runspace-Muster implementieren", "UI läuft in eigenem Runspace; PowerShell-Instanz mit SynchronizedHashtable für Thread-sichere Kommunikation", "critical", "gui"], ["P6-06", "GUI-Fortschrittsanzeige an Launcher-Events binden", "Fortschritts-Events aus Phase 4 in WPF-Dispatcher.Invoke() weiterleiten; UI-Update ohne Freeze", "high", "gui"], ["P6-07", "Sauberes Beenden aller GUI-Ressourcen sicherstellen", "Dispose() auf NotifyIcon, WPF-Window schließen, Runspace beenden — auch bei Fehler (try/finally)", "high", "gui"]], "Phase 7: Settings & Konfiguration": [["P7-01", "Settings-Datei psapp.settings.conf definieren", "Format: Key=Value, eine Einstellung pro Zeile; Kommentare mit #; Beispiel: LogLevel=INFO, MaxLogs=50", "medium", "settings"], ["P7-02", "Funktion Get-PSARSettings implementieren", "Liest settings-Datei, gibt Hashtable zurück; Default-Werte wenn Datei fehlt", "medium", "settings"], ["P7-03", "Funktion Set-PSARSetting implementieren", "Schreibt/aktualisiert einen Wert in der settings-Datei; atomares Schreiben", "low", "settings"], ["P7-04", "Settings beim Start laden und global verfügbar machen", "$script:PSAR_Settings = Get-PSARSettings; alle Module greifen auf diese Variable zu", "medium", "settings"]], "Phase 8: Fehlerbehandlung & Robustheit": [["P8-01", "Globalen Error-Handler implementieren", "trap { } oder $ErrorActionPreference='Stop' + Try/Catch in Main; unbehandelte Fehler ins Log schreiben", "critical", "robustness"], ["P8-02", "Graceful-Exit bei kritischen Fehlern implementieren", "Exit-Codes definieren: 0=OK, 1=Parameterfehler, 2=Profil nicht gefunden, 3=Launcher-Fehler, 99=Unbekannt", "high", "robustness"], ["P8-03", "Eingabe-Sanitization implementieren", "Alle String-Parameter: Trim, Länge prüfen, gefährliche Zeichen (Semikolon, Backtick in ProfileID) ablehnen", "critical", "robustness"], ["P8-04", "Profil-Datei darf nur ExePfade starten (Path Traversal verhindern)", "ExePath muss absoluter Pfad sein, keine .., keine UNC-Shares (optional konfigurierbar), Extension muss .exe sein", "critical", "robustness"], ["P8-05", "psapp.profiledb.conf vor Injection schützen", "Beim Schreiben: Semikolon im ProfileName verbieten; beim Lesen: Zeilen strikt parsen (Split(';')[0] und [1] only)", "high", "robustness"], ["P8-06", "Parallelstart verhindern (Single-Instance-Guard)", "Mutex mit globalem Namen; wenn bereits eine Instanz läuft: Fehler + Exit", "medium", "robustness"], ["P8-07", "Require-Elevation-Check implementieren", "Wenn AsAdmin-Einträge vorhanden: prüfen ob UAC verfügbar; warnen wenn UAC deaktiviert", "medium", "robustness"]], "Phase 9: Testing & Qualitätssicherung": [["P9-01", "Pester-Test-Suite anlegen", "Verzeichnis .\\tests\\; Pester v5; separate Test-Dateien pro Core-Modul", "high", "testing"], ["P9-02", "Unit-Tests für Validierungsfunktionen", "Tests für: ProfileID-Regex, WaitMillisecs-100er-Schritte, WindowStyle-Enum, ExePath-Extension, Max-20-Limit", "high", "testing"], ["P9-03", "Unit-Tests für Profil-CRUD-Operationen", "Tests für: New-PSARProfile (Duplikat, Erfolg), Remove-PSARProfile, Get-PSARProfile (ungültige Datei)", "high", "testing"], ["P9-04", "Unit-Tests für Log-Rotation", "Test: 50 Dummy-Logs erstellen, neues Log triggern, prüfen ob ältestes gelöscht wurde", "medium", "testing"], ["P9-05", "Integration-Test: Hidden-Mode End-to-End", "Testprofil mit Notepad.exe erstellen, Hidden-Mode ausführen, Log prüfen, Notepad const PRIO_ORDER = {critical:0,high:1,medium:2,low:3};
const PRIO_LABELS = {critical:'Kritisch',high:'Hoch',medium:'Mittel',low:'Niedrig'};
const PRIO_COLORS = {critical:'var(--error)',high:'var(--warn)',medium:'var(--orange)',low:'var(--success)'};
const CAT_LABELS = {structure:'Struktur',params:'Parameter',profile:'Profil-Mgmt',launcher:'Launcher',logging:'Logging',gui:'GUI-Modi',settings:'Settings',robustness:'Robustheit',testing:'Testing',docs:'Dokumentation'};

let state = {};
let activeFilters = {prio: null, cat: null, status: null};
let currentView = 'tasks';

try { const s = sessionStorage.getItem('superdo_state'); if(s) state = JSON.parse(s); } catch(e){}

function saveState() {
  try { sessionStorage.setItem('superdo_state', JSON.stringify(state)); } catch(e){}
}

function allTasks() { return Object.values(TODOS).flat(); }
function getDoneCount() { return allTasks().filter(t=>state[t[0]]).length; }
function getTotalCount() { return allTasks().length; }

function getPhaseStats(phase) {
  const tasks = TODOS[phase];
  const done = tasks.filter(t=>state[t[0]]).length;
  return {done, total:tasks.length};
}

// ============================================================
// STATUS BAR
// ============================================================
function buildStatusBar() {
  const total = getTotalCount();
  const done = getDoneCount();
  const pct = total ? Math.round(done/total*100) : 0;
  const byPrio = {critical:0,high:0,medium:0,low:0};
  allTasks().forEach(t=>{ byPrio[t[3]]++; });

  document.getElementById('statusBarFill').style.width = pct+'%';
  document.getElementById('statusBarPct').textContent = pct+'%';
  document.getElementById('statusBarDone').textContent = done+' / '+total;

  document.getElementById('statusBarLeft').innerHTML = `
    <span class="status-pill"><span class="sdot" style="background:var(--error)"></span>${byPrio.critical} Kritisch</span>
    <span class="status-pill"><span class="sdot" style="background:var(--warn)"></span>${byPrio.high} Hoch</span>
    <span class="status-pill"><span class="sdot" style="background:var(--orange)"></span>${byPrio.medium} Mittel</span>
    <span class="status-pill"><span class="sdot" style="background:var(--success)"></span>${byPrio.low} Niedrig</span>
  `;
}

// ============================================================
// FILTERS
// ============================================================
function buildFilters() {
  const bar = document.getElementById('filtersBar');
  const prioFilters = Object.keys(PRIO_ORDER).map(p=>`<button class="filter-btn prio-filter ${activeFilters.prio===p?'active':''}" data-prio="${p}">${PRIO_LABELS[p]}</button>`).join('');
  const catFilters = Object.keys(CAT_LABELS).map(c=>`<button class="filter-btn cat-filter ${activeFilters.cat===c?'active':''}" data-cat="${c}">${CAT_LABELS[c]}</button>`).join('');
  const statusFilters = `
    <button class="filter-btn status-filter ${activeFilters.status==='open'?'active':''}" data-status="open">Offen</button>
    <button class="filter-btn status-filter ${activeFilters.status==='done'?'active':''}" data-status="done">Erledigt</button>
  `;
  bar.innerHTML = `
    <span class="filter-label">Priorität</span>${prioFilters}
    <div class="filter-sep"></div>
    <span class="filter-label">Kategorie</span>${catFilters}
    <div class="filter-sep"></div>
    <span class="filter-label">Status</span>${statusFilters}
    <div class="filter-sep"></div>
    <button class="filter-btn" id="clearFilters">✕ Zurücksetzen</button>
  `;
  bar.querySelectorAll('.prio-filter').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeFilters.prio = activeFilters.prio===btn.dataset.prio?null:btn.dataset.prio; rebuild(); });
  });
  bar.querySelectorAll('.cat-filter').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeFilters.cat = activeFilters.cat===btn.dataset.cat?null:btn.dataset.cat; rebuild(); });
  });
  bar.querySelectorAll('.status-filter').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeFilters.status = activeFilters.status===btn.dataset.status?null:btn.dataset.status; rebuild(); });
  });
  document.getElementById('clearFilters').addEventListener('click',()=>{ activeFilters={prio:null,cat:null,status:null}; rebuild(); });
}

function taskMatchesFilters(task, searchVal) {
  const isDone = !!state[task[0]];
  if(activeFilters.prio && task[3]!==activeFilters.prio) return false;
  if(activeFilters.cat && task[4]!==activeFilters.cat) return false;
  if(activeFilters.status==='open' && isDone) return false;
  if(activeFilters.status==='done' && !isDone) return false;
  if(searchVal) {
    const q = searchVal.toLowerCase();
    if(!(task[0].toLowerCase().includes(q)||task[1].toLowerCase().includes(q)||task[2].toLowerCase().includes(q)||(CAT_LABELS[task[4]]||'').toLowerCase().includes(q)||(PRIO_LABELS[task[3]]||'').toLowerCase().includes(q))) return false;
  }
  return true;
}

// ============================================================
// TASK LIST
// ============================================================
function buildPhases(searchVal='') {
  const grid = document.getElementById('phasesGrid');
  grid.innerHTML='';
  let anyVisible = false;

  Object.entries(TODOS).forEach(([phase, tasks],pi)=>{
    const phaseKey = 'phase_'+pi;
    const collapsed = sessionStorage.getItem('superdo_col_'+phaseKey)==='1';
    const {done,total} = getPhaseStats(phase);
    const pct = total ? Math.round(done/total*100) : 0;
    const visibleTasks = tasks.filter(t=>taskMatchesFilters(t,searchVal));
    if(visibleTasks.length===0 && (activeFilters.prio||activeFilters.cat||activeFilters.status||searchVal)) return;
    anyVisible=true;

    const card = document.createElement('div');
    card.className = 'phase-card'+(collapsed?' collapsed':'');
    card.dataset.phase = phaseKey;

    const phaseNum = phase.match(/Phase (\d+)/)?.[1]||'?';
    card.innerHTML = `
      <div class="phase-header">
        <svg class="phase-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
        <span class="phase-badge">Phase ${phaseNum}</span>
        <span class="phase-title">${phase.replace(/Phase \d+: /,'')}</span>
        <div class="phase-meta">
          <span class="phase-progress">${done}/${total}</span>
          <div class="phase-mini-bar"><div class="phase-mini-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="phase-body">
        <table class="todo-table">
          <thead><tr>
            <th></th>
            <th>ID</th>
            <th>Aufgabe</th>
            <th>Priorität</th>
            <th>Kategorie</th>
          </tr></thead>
          <tbody id="tbody_${phaseKey}"></tbody>
        </table>
        <div class="empty-state" id="empty_${phaseKey}" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <h3>Keine Treffer</h3>
          <p>Kein Eintrag in dieser Phase entspricht dem Filter.</p>
        </div>
      </div>
    `;
    grid.appendChild(card);

    const tbody = document.getElementById('tbody_'+phaseKey);
    let shown = 0;
    tasks.forEach(task=>{
      const [id,name,desc,prio,cat] = task;
      const isDone = !!state[id];
      const visible = taskMatchesFilters(task,searchVal);
      const tr = document.createElement('tr');
      tr.className = (isDone?'done':'')+(!visible?' hidden-row':'');
      tr.dataset.taskId = id;
      tr.innerHTML = `
        <td><div class="cb-wrap"><div class="cb ${isDone?'checked':''}" data-id="${id}" tabindex="0" role="checkbox" aria-checked="${isDone}" aria-label="${name}"></div></div></td>
        <td><span class="task-id">${id}</span></td>
        <td>
          <div class="task-name">${name}</div>
          <div class="task-desc">${desc}</div>
        </td>
        <td><span class="prio ${prio}"><span class="prio-dot" style="background:currentColor"></span>${PRIO_LABELS[prio]}</span></td>
        <td><span class="cat">${CAT_LABELS[cat]||cat}</span></td>
      `;
      tbody.appendChild(tr);
      if(visible) shown++;
    });

    if(shown===0 && (activeFilters.prio||activeFilters.cat||activeFilters.status||searchVal)){
      document.getElementById('empty_'+phaseKey).style.display='';
    }

    card.querySelector('.phase-header').addEventListener('click',()=>{
      card.classList.toggle('collapsed');
      sessionStorage.setItem('superdo_col_'+phaseKey, card.classList.contains('collapsed')?'1':'0');
    });
  });

  if(!anyVisible){
    grid.innerHTML=`<div class="empty-state" style="padding:4rem 1rem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;margin:0 auto 1rem"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <h3>Keine Aufgaben gefunden</h3>
      <p>Passe die Filter oder die Suche an.</p>
    </div>`;
  }

  document.querySelectorAll('.cb').forEach(cb=>{
    cb.addEventListener('click',()=>toggleTask(cb.dataset.id));
    cb.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleTask(cb.dataset.id);} });
  });
}

// ============================================================
// DASHBOARD
// ============================================================
function buildDashboard() {
  const container = document.getElementById('dashboardContent');
  const total = getTotalCount();
  const done = getDoneCount();
  const open = total - done;
  const pct = total ? Math.round(done/total*100) : 0;

  const byPrio = {critical:0,high:0,medium:0,low:0};
  const byPrioDone = {critical:0,high:0,medium:0,low:0};
  const byCat = {};
  const byCatDone = {};
  allTasks().forEach(t=>{
    byPrio[t[3]]++;
    if(state[t[0]]) byPrioDone[t[3]]++;
    byCat[t[4]] = (byCat[t[4]]||0)+1;
    if(state[t[0]]) byCatDone[t[4]] = (byCatDone[t[4]]||0)+1;
  });

  const circumference = 2 * Math.PI * 34;
  const offset = circumference - (pct/100)*circumference;

  container.innerHTML = `
    <div>
      <div class="dash-heading">Dashboard</div>
      <div class="dash-subheading">Gesamtübersicht · PSAppRocket ToDo</div>
    </div>

    <!-- Progress card -->
    <div class="dash-progress-card">
      <div class="dash-pct-ring">
        <svg viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="34"/>
          <circle class="ring-fill" cx="40" cy="40" r="34"
            stroke-dasharray="${circumference.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="dash-pct-label">${pct}%</div>
      </div>
      <div class="dash-progress-info">
        <div class="dash-progress-title">Gesamtfortschritt</div>
        <div class="dash-progress-sub">${done} von ${total} Aufgaben erledigt · ${open} noch offen</div>
        <div class="dash-progress-bar-wrap"><div class="dash-progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <!-- Priority cards -->
    <div>
      <div class="dash-section-title">Priorität</div>
      <div class="dash-cards-grid">
        <div class="dash-card">
          <div class="dash-card-icon" style="background:var(--error-hl)">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div class="dash-card-value" style="color:var(--error)">${byPrio.critical}</div>
          <div class="dash-card-label">Kritisch</div>
          <div class="dash-card-sub">${byPrioDone.critical} erledigt</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-icon" style="background:var(--warn-hl)">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <div class="dash-card-value" style="color:var(--warn)">${byPrio.high}</div>
          <div class="dash-card-label">Hoch</div>
          <div class="dash-card-sub">${byPrioDone.high} erledigt</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-icon" style="background:var(--orange-hl)">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="dash-card-value" style="color:var(--orange)">${byPrio.medium}</div>
          <div class="dash-card-label">Mittel</div>
          <div class="dash-card-sub">${byPrioDone.medium} erledigt</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-icon" style="background:var(--success-hl)">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="dash-card-value" style="color:var(--success)">${byPrio.low}</div>
          <div class="dash-card-label">Niedrig</div>
          <div class="dash-card-sub">${byPrioDone.low} erledigt</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-icon" style="background:var(--primary-hl)">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 11 12 14 22 4"/></svg>
          </div>
          <div class="dash-card-value" style="color:var(--primary)">${done}</div>
          <div class="dash-card-label">Erledigt</div>
          <div class="dash-card-sub">von ${total} gesamt</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-icon" style="background:var(--surface-dyn)">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          </div>
          <div class="dash-card-value">${open}</div>
          <div class="dash-card-label">Offen</div>
          <div class="dash-card-sub">${total > 0 ? (100-pct) : 0}% ausstehend</div>
        </div>
      </div>
    </div>

    <!-- Category breakdown -->
    <div>
      <div class="dash-section-title">Kategorie</div>
      <div class="dash-cat-grid">
        ${Object.entries(CAT_LABELS).map(([key,label])=>{
          const count = byCat[key]||0;
          const doneCount = byCatDone[key]||0;
          const catPct = count ? Math.round(doneCount/count*100) : 0;
          return `<div class="dash-cat-row">
            <span class="dash-cat-label">${label}</span>
            <div class="dash-cat-bar-wrap"><div class="dash-cat-bar-fill" style="width:${catPct}%"></div></div>
            <span class="dash-cat-count">${doneCount}/${count}</span>
            <span class="dash-cat-done">${catPct}%</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ============================================================
// VIEWS
// ============================================================
function switchView(viewId, filterPrio, filterStatus) {
  currentView = viewId;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const el = document.getElementById('view-'+viewId);
  if(el) el.classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navEl = document.getElementById('nav-'+viewId);
  if(navEl) navEl.classList.add('active');

  if(filterPrio) { activeFilters.prio = filterPrio; activeFilters.status = null; activeFilters.cat = null; }
  if(filterStatus) { activeFilters.status = filterStatus; activeFilters.prio = null; activeFilters.cat = null; }

  if(viewId === 'dashboard') buildDashboard();

  // Close sidebar on mobile after nav
  if(window.innerWidth <= 768) closeSidebar();
}

// ============================================================
// SIDEBAR TOGGLE
// ============================================================
function openSidebar() {
  document.getElementById('sidebar').classList.remove('collapsed');
  document.getElementById('sidebarOverlay').classList.add('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.add('collapsed');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  if(sb.classList.contains('collapsed')) openSidebar();
  else closeSidebar();
}

document.getElementById('btnSidebarToggle').addEventListener('click', toggleSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

// Nav items
document.querySelectorAll('.nav-item[data-view]').forEach(item=>{
  item.addEventListener('click',()=>{
    const fp = item.dataset.filterPrio || null;
    const fs = item.dataset.filterStatus || null;
    switchView(item.dataset.view, fp, fs);
    rebuild();
  });
});

// Also handle specific filter nav items
document.getElementById('nav-critical').addEventListener('click',()=>{
  activeFilters = {prio:'critical',cat:null,status:null};
  switchView('tasks');
  rebuild();
});
document.getElementById('nav-open').addEventListener('click',()=>{
  activeFilters = {prio:null,cat:null,status:'open'};
  switchView('tasks');
  rebuild();
});
document.getElementById('nav-done').addEventListener('click',()=>{
  activeFilters = {prio:null,cat:null,status:'done'};
  switchView('tasks');
  rebuild();
});

// ============================================================
// TOGGLE TASK
// ============================================================
function toggleTask(id) {
  state[id] = !state[id];
  saveState();
  rebuild();
}

// ============================================================
// THEME
// ============================================================
const html = document.documentElement;
let theme = html.getAttribute('data-theme')||'dark';
const themeBtn = document.getElementById('themeToggle');
function setTheme(t){
  theme=t; html.setAttribute('data-theme',t);
  themeBtn.innerHTML = t==='dark'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
}
themeBtn.addEventListener('click',()=>setTheme(theme==='dark'?'light':'dark'));

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', e=>{
  if(currentView !== 'tasks') switchView('tasks');
  buildPhases(e.target.value);
});

// ============================================================
// EXPORT CSV
// ============================================================
document.getElementById('exportBtn').addEventListener('click',()=>{
  let csv = 'ID;Phase;Aufgabe;Beschreibung;Priorität;Kategorie;Status\n';
  Object.entries(TODOS).forEach(([phase,tasks])=>{
    tasks.forEach(t=>{
      const status = state[t[0]]?'Erledigt':'Offen';
      csv += [t[0], phase.replace(/Phase \d+: /,''), t[1], t[2], PRIO_LABELS[t[3]], CAT_LABELS[t[4]], status].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';')+'\n';
    });
  });
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='SuperDo_Tasks.csv'; a.click();
});

// ============================================================
// REBUILD
// ============================================================
function rebuild() {
  const q = document.getElementById('searchInput')?.value||'';
  buildStatusBar();
  buildFilters();
  buildPhases(q);
  if(currentView === 'dashboard') buildDashboard();
}

rebuild();
</script>
</body>
</html>
