<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="SuperDo – Task Manager for PSAppRocket development"/>
  <title>SuperDo – Task Manager</title>
  <!-- Version: v1.00.03 -->

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- App Stylesheet (external) -->
  <link rel="stylesheet" href="assets/css/superdo.css"/>
</head>
<body>

<!-- ============================================================
     APP SHELL
     ============================================================ -->
<div class="app-shell">

  <!-- ========================================================
       SIDEBAR  (left, collapsible, fixed width)
       ======================================================== -->
  <aside class="sidebar" id="sidebar" aria-label="Navigation">

    <div class="sidebar-header">
      <a href="#" class="sidebar-logo" aria-label="SuperDo Home">
        <svg class="sidebar-logo-icon" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="7" fill="var(--primary)"/>
          <path d="M7 14.5l4.5 4.5L21 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="sidebar-logo-text">Super<span>Do</span></span>
      </a>
    </div>

    <nav class="sidebar-nav" aria-label="Main navigation">
      <div class="nav-section-label">Navigation</div>

      <button class="nav-item active" data-view="tasks" aria-label="Task Overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Overview
      </button>

      <button class="nav-item" data-view="tasks" aria-label="All Tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
        Tasks
      </button>

      <button class="nav-item" data-view="dashboard" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 3h7v9H3zM14 3h7v5h-7zM14 12h7v9h-7zM3 16h7v5H3z"/>
        </svg>
        Dashboard
      </button>

      <div class="nav-section-label" style="margin-top:.75rem">Quick Filter</div>

      <button class="nav-item" id="navFilterCritical" aria-label="Show critical tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Critical
      </button>

      <button class="nav-item" id="navFilterOpen" aria-label="Show open tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Open
      </button>

      <button class="nav-item" id="navFilterDone" aria-label="Show completed tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Completed
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-version">SuperDo v1.00.03</div>
      <div>PSAppRocket · WebAppX</div>
    </div>
  </aside>

  <!-- Mobile sidebar backdrop -->
  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <!-- ========================================================
       CONTENT AREA  (header + scrollable body + status bar)
       ======================================================== -->
  <div class="content-area">

    <!-- ======================================================
         HEADER  (sticky top, fixed height)
         ====================================================== -->
    <header class="header" role="banner">
      <button class="btn-sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="header-title" aria-hidden="true">SuperDo</div>

      <div class="header-center">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            class="search"
            type="text"
            id="searchInput"
            placeholder="Search tasks…"
            autocomplete="off"
            aria-label="Search tasks"
          />
        </div>
      </div>

      <div class="header-right">
        <button class="btn-icon" id="themeToggle" aria-label="Toggle theme"></button>
        <button class="btn-export" id="btnExport" aria-label="Export as CSV">↓ CSV</button>
      </div>
    </header>

    <!-- ======================================================
         PAGE BODY  (the ONE and ONLY scroll region)
         ====================================================== -->
    <main class="page-body" id="pageBody" role="main">

      <!-- Filter bar (sticky within page-body) -->
      <div class="filters" id="filtersBar" role="toolbar" aria-label="Task filters">
        <!-- Populated by JS -->
      </div>

      <!-- Tasks View -->
      <div class="view active" id="tasksView" role="region" aria-label="Task list">
        <div class="main">
          <div class="phases-grid" id="phasesGrid">
            <!-- Phase cards populated by JS -->
          </div>
        </div>
      </div>

      <!-- Dashboard View -->
      <div class="view" id="dashboardView" role="region" aria-label="Dashboard">
        <div class="dashboard" id="dashboardContent">
          <!-- Populated by JS -->
        </div>
      </div>

    </main>

    <!-- ======================================================
         STATUS BAR  (sticky bottom, fixed height)
         ====================================================== -->
    <footer class="status-bar" role="contentinfo" aria-label="Project status">
      <div class="status-bar-left" id="statusBarLeft">
        <!-- Priority pills populated by JS -->
      </div>
      <div class="status-bar-progress" aria-label="Overall progress">
        <div class="status-bar-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div class="status-bar-progress-fill" id="statusBarFill"></div>
        </div>
        <span class="status-bar-pct" id="statusBarPct">0%</span>
        <span class="status-bar-done" id="statusBarDone">0 / 0</span>
      </div>
    </footer>

  </div><!-- /content-area -->
</div><!-- /app-shell -->

<!-- App Module (external, deferred) -->
<script src="assets/js/superdo.js" defer></script>

</body>
</html>
