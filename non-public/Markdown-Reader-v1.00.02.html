<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkdownReader v1.00.02</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Marked library for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ============================================================
           DESIGN TOKENS
        ============================================================ */
        :root, [data-theme="light"] {
            --color-bg: #f7f6f2;
            --color-surface: #f9f8f5;
            --color-surface-2: #fbfbf9;
            --color-surface-offset: #f3f0ec;
            --color-surface-dynamic: #e6e4df;
            --color-divider: #dcd9d5;
            --color-border: #d4d1ca;
            --color-text: #28251d;
            --color-text-muted: #7a7974;
            --color-text-faint: #bab9b4;
            --color-primary: #01696f;
            --color-primary-hover: #0c4e54;
            --color-primary-active: #0f3638;
            --color-primary-highlight: #cedcd8;
            --color-primary-glow: oklch(from #01696f l c h / 0.15);
            --color-code-bg: #edeae5;
            --color-code-text: #28251d;
            
            --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
            --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
            --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
            
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            
            --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
            
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;

            --font-body: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        [data-theme="dark"] {
            --color-bg: #0f0f0e;
            --color-surface: #161614;
            --color-surface-2: #1c1b19;
            --color-surface-offset: #1a1917;
            --color-surface-dynamic: #252422;
            --color-divider: #222120;
            --color-border: #2e2d2b;
            --color-text: #d4d3d0;
            --color-text-muted: #706f6d;
            --color-text-faint: #484745;
            --color-primary: #3fa8b0;
            --color-primary-hover: #5bbec6;
            --color-primary-active: #1a8a93;
            --color-primary-highlight: #1f3638;
            --color-primary-glow: oklch(from #3fa8b0 l c h / 0.12);
            --color-code-bg: #1e1d1b;
            --color-code-text: #c8c7c4;

            --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.25);
            --shadow-md: 0 4px 16px oklch(0 0 0 / 0.35);
            --shadow-lg: 0 16px 48px oklch(0 0 0 / 0.5);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                --color-bg: #0f0f0e;
                --color-surface: #161614;
                --color-surface-2: #1c1b19;
                --color-surface-offset: #1a1917;
                --color-surface-dynamic: #252422;
                --color-divider: #222120;
                --color-border: #2e2d2b;
                --color-text: #d4d3d0;
                --color-text-muted: #706f6d;
                --color-text-faint: #484745;
                --color-primary: #3fa8b0;
                --color-primary-hover: #5bbec6;
                --color-primary-active: #1a8a93;
                --color-primary-highlight: #1f3638;
                --color-primary-glow: oklch(from #3fa8b0 l c h / 0.12);
                --color-code-bg: #1e1d1b;
                --color-code-text: #c8c7c4;
                --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.25);
                --shadow-md: 0 4px 16px oklch(0 0 0 / 0.35);
                --shadow-lg: 0 16px 48px oklch(0 0 0 / 0.5);
            }
        }

        /* ============================================================
           BASE STYLES
        ============================================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            font-size: var(--text-sm);
            color: var(--color-text);
            background: var(--color-bg);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        button {
            cursor: pointer;
            background: none;
            border: none;
            font: inherit;
            color: inherit;
        }

        input {
            font: inherit;
            color: inherit;
        }

        ::selection {
            background: var(--color-primary-highlight);
            color: var(--color-text);
        }

        :focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 3px;
            border-radius: var(--radius-sm);
        }

        /* ============================================================
           TOOLBAR
        ============================================================ */
        .toolbar {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-5);
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            z-index: 10;
        }

        .toolbar-logo {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-right: var(--space-3);
            user-select: none;
        }

        .toolbar-logo svg {
            color: var(--color-primary);
            flex-shrink: 0;
        }

        .toolbar-logo-text {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text);
            letter-spacing: -0.01em;
        }

        .toolbar-logo-badge {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--color-primary);
            background: var(--color-primary-highlight);
            padding: 1px 5px;
            border-radius: var(--radius-full);
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--color-border);
            flex-shrink: 0;
        }

        .toolbar-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 500;
            transition: background var(--transition), color var(--transition), box-shadow var(--transition);
            white-space: nowrap;
            position: relative;
        }

        .toolbar-btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .toolbar-btn:hover {
            background: var(--color-surface-dynamic);
        }

        .toolbar-btn:active {
            background: var(--color-surface-offset);
        }

        .toolbar-btn.primary {
            background: var(--color-primary);
            color: #fff;
        }

        .toolbar-btn.primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 0 0 3px var(--color-primary-glow);
        }

        .toolbar-btn.primary:active {
            background: var(--color-primary-active);
        }

        .toolbar-btn.secondary {
            background: var(--color-surface-offset);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .toolbar-btn.secondary:hover {
            background: var(--color-surface-dynamic);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* URL input group */
        .url-input-group {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex: 1;
            min-width: 0;
            max-width: 520px;
        }

        .url-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-3);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .url-input-wrapper:focus-within {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-glow);
        }

        .url-input-wrapper svg {
            color: var(--color-text-muted);
            flex-shrink: 0;
            width: 14px;
            height: 14px;
        }

        .url-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: var(--text-xs);
            color: var(--color-text);
            min-width: 0;
        }

        .url-input::placeholder {
            color: var(--color-text-faint);
        }

        .toolbar-spacer {
            flex: 1;
        }

        /* Icon button */
        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            color: var(--color-text-muted);
            transition: background var(--transition), color var(--transition);
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: var(--color-surface-dynamic);
            color: var(--color-text);
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ============================================================
           MAIN LAYOUT (SIDEBAR + CONTENT)
        ============================================================ */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 300px; /* Increased width as requested (from 260px) */
            min-width: 220px;
            max-width: 480px;
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            transition: width var(--transition);
            position: relative;
        }

        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            border-right: none;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: var(--text-xs);
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--color-text-muted);
        }

        .sidebar-search {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--color-divider);
            flex-shrink: 0;
        }

        .sidebar-search-input {
            flex: 1;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: var(--space-1) var(--space-3);
            font-size: var(--text-xs);
            color: var(--color-text);
            outline: none;
            transition: border-color var(--transition);
        }

        .sidebar-search-input::placeholder {
            color: var(--color-text-faint);
        }

        .sidebar-search-input:focus {
            border-color: var(--color-primary);
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-2) var(--space-2); /* Adjusted vertical padding */
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-nav::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 2px;
        }

        .sidebar-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-12) var(--space-6);
            gap: var(--space-3);
            color: var(--color-text-faint);
        }

        .sidebar-empty svg {
            width: 32px;
            height: 32px;
            opacity: 0.5;
        }

        .sidebar-empty p {
            font-size: var(--text-xs);
            line-height: 1.6;
            max-width: 28ch;
        }

        /* Heading entries */
        .toc-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            width: 100%;
            text-align: left;
            padding: var(--space-1) var(--space-3); /* Reduced vertical padding for tighter fit */
            border-radius: var(--radius-md);
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            transition: background var(--transition), color var(--transition);
            cursor: pointer;
            border: none;
            background: none;
            text-decoration: none;
            line-height: 1.3; /* Tighter line height */
            word-break: break-word;
        }

        .toc-item:hover {
            background: var(--color-surface-dynamic);
            color: var(--color-text);
        }

        .toc-item.active {
            background: var(--color-primary-highlight);
            color: var(--color-primary);
            font-weight: 500;
        }

        .toc-item.h1 {
            font-weight: 600;
            font-size: var(--text-sm);
            color: var(--color-text);
            padding-left: var(--space-3);
            margin-top: var(--space-1); /* Slight separation for H1 */
        }

        .toc-item.h2 {
            padding-left: var(--space-5);
        }

        .toc-item.h3 {
            padding-left: var(--space-8);
            font-size: 0.72rem;
        }

        .toc-item.h4, .toc-item.h5, .toc-item.h6 {
            padding-left: var(--space-10);
            font-size: 0.7rem;
            color: var(--color-text-faint);
        }

        .toc-item-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
            opacity: 0.5;
        }

        .toc-item.h1 .toc-item-dot {
            width: 7px;
            height: 7px;
            opacity: 0.8;
        }

        /* Resize handle */
        .resize-handle {
            position: absolute;
            right: -3px;
            top: 0;
            bottom: 0;
            width: 6px;
            cursor: col-resize;
            z-index: 20;
        }

        .resize-handle::after {
            content: '';
            position: absolute;
            right: 2px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: transparent;
            transition: background var(--transition);
        }

        .resize-handle:hover::after {
            background: var(--color-primary);
        }

        /* ============================================================
           CONTENT AREA
        ============================================================ */
        .content-area {
            flex: 1;
            overflow-y: auto;
            background: var(--color-bg);
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
            min-width: 0;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        .content-inner {
            max-width: 780px;
            margin: 0 auto;
            padding: var(--space-10) var(--space-10) var(--space-12);
        }

        /* Welcome/empty state */
        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: calc(100dvh - 56px);
            padding: var(--space-8);
            gap: var(--space-4);
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            margin-bottom: var(--space-2);
        }

        .welcome-icon svg {
            width: 28px;
            height: 28px;
        }

        .welcome-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .welcome-sub {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            max-width: 38ch;
            line-height: 1.7;
        }

        .welcome-actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-2);
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Drag overlay */
        .drag-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: oklch(from var(--color-primary) l c h / 0.08);
            border: 2px dashed var(--color-primary);
            border-radius: var(--radius-lg);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: var(--space-3);
            color: var(--color-primary);
            font-size: var(--text-base);
            font-weight: 500;
            pointer-events: none;
        }

        .drag-overlay.visible {
            display: flex;
        }

        .drag-overlay svg {
            width: 48px;
            height: 48px;
        }

        /* File name badge in toolbar */
        .file-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-1) var(--space-3);
            background: var(--color-surface-offset);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-badge svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
            color: var(--color-primary);
        }

        /* ============================================================
           MARKDOWN RENDERING
        ============================================================ */
        .md-body {
            color: var(--color-text);
            font-size: var(--text-base);
            line-height: 1.8;
        }

        .md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 {
            font-weight: 600;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-top: var(--space-10);
            margin-bottom: var(--space-4);
            color: var(--color-text);
            scroll-margin-top: 5rem;
        }

        .md-body h1 {
            font-size: var(--text-xl);
            font-weight: 700;
            padding-bottom: var(--space-4);
            border-bottom: 2px solid var(--color-border);
            margin-top: 0;
        }

        .md-body h2 {
            font-size: var(--text-lg);
            padding-bottom: var(--space-3);
            border-bottom: 1px solid var(--color-border);
        }

        .md-body h3 { font-size: calc(var(--text-base) * 1.15); }
        .md-body h4 { font-size: var(--text-base); color: var(--color-text-muted); }
        .md-body h5, .md-body h6 { font-size: var(--text-sm); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        .md-body p {
            margin-bottom: var(--space-5);
            max-width: 72ch;
            text-wrap: pretty;
        }

        .md-body a {
            color: var(--color-primary);
            text-decoration: underline;
            text-decoration-color: oklch(from var(--color-primary) l c h / 0.4);
            text-underline-offset: 3px;
            transition: color var(--transition), text-decoration-color var(--transition);
        }

        .md-body a:hover {
            color: var(--color-primary-hover);
            text-decoration-color: var(--color-primary-hover);
        }

        .md-body strong {
            font-weight: 600;
            color: var(--color-text);
        }

        .md-body em {
            font-style: italic;
        }

        .md-body del {
            text-decoration: line-through;
            color: var(--color-text-muted);
        }

        .md-body ul, .md-body ol {
            padding-left: var(--space-6);
            margin-bottom: var(--space-5);
        }

        .md-body li {
            margin-bottom: var(--space-2);
            line-height: 1.7;
        }

        .md-body li > ul, .md-body li > ol {
            margin-top: var(--space-2);
            margin-bottom: 0;
        }

        .md-body ul li { list-style-type: disc; }
        .md-body ol li { list-style-type: decimal; }

        .md-body blockquote {
            margin: var(--space-6) 0;
            padding: var(--space-4) var(--space-6);
            border-left: 3px solid var(--color-primary);
            background: var(--color-primary-highlight);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            color: var(--color-text-muted);
            font-style: italic;
        }

        .md-body blockquote p {
            margin-bottom: 0;
        }

        .md-body code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            background: var(--color-code-bg);
            color: var(--color-primary);
            padding: 0.15em 0.4em;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
        }

        .md-body pre {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            overflow-x: auto;
            margin: var(--space-6) 0;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .md-body pre code {
            background: none;
            color: var(--color-code-text);
            padding: 0;
            border: none;
            font-size: var(--text-xs);
            line-height: 1.7;
        }

        .md-body table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-6) 0;
            font-size: var(--text-sm);
            overflow: hidden;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .md-body th {
            background: var(--color-surface-offset);
            font-weight: 600;
            text-align: left;
            padding: var(--space-3) var(--space-4);
            color: var(--color-text);
            border-bottom: 1px solid var(--color-border);
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .md-body td {
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--color-divider);
            color: var(--color-text-muted);
        }

        .md-body tr:last-child td { border-bottom: none; }
        .md-body tr:hover td { background: var(--color-surface); color: var(--color-text); }

        .md-body hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: var(--space-10) 0;
        }

        .md-body img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-md);
            margin: var(--space-4) 0;
        }

        .md-body input[type="checkbox"] {
            margin-right: var(--space-2);
            accent-color: var(--color-primary);
        }

        /* ============================================================
           LOADING STATE
        ============================================================ */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-4);
            padding: var(--space-16);
            color: var(--color-text-muted);
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .md-body { animation: fadeIn 0.25s ease-out; }

        /* ============================================================
           TOAST
        ============================================================ */
        .toast-container {
            position: fixed;
            bottom: var(--space-5);
            right: var(--space-5);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            z-index: 200;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            font-size: var(--text-xs);
            color: var(--color-text);
            max-width: 320px;
            animation: slideIn 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
        }

        .toast.success { border-color: var(--color-primary); }
        .toast.error { border-color: #c0392b; }

        .toast svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .toast.success svg { color: var(--color-primary); }
        .toast.error svg { color: #e74c3c; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

        /* ============================================================
           SCROLLBAR PROGRESS
        ============================================================ */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--color-primary);
            z-index: 50;
            transform-origin: left;
            transition: width 0.1s linear;
        }

        /* ============================================================
           COPY CODE BUTTON
        ============================================================ */
        .code-block-wrapper { position: relative; }
        .copy-btn {
            position: absolute;
            top: var(--space-3);
            right: var(--space-3);
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-2);
            background: var(--color-surface-offset);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 0.68rem;
            font-family: var(--font-body);
            color: var(--color-text-muted);
            cursor: pointer;
            transition: opacity var(--transition), background var(--transition);
            opacity: 0;
        }

        .code-block-wrapper:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: var(--color-surface-dynamic); color: var(--color-text); }
        .copy-btn.copied { color: var(--color-primary); }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 56px;
                bottom: 0;
                z-index: 30;
                transform: translateX(-100%);
                transition: transform var(--transition);
                width: 280px !important;
            }
            .sidebar.mobile-open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }
            .sidebar-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: oklch(0 0 0 / 0.5);
                z-index: 29;
            }
            .sidebar-backdrop.visible {
                display: block;
            }
            .url-input-group { max-width: 200px; }
            .toolbar-btn span { display: none; }
            .toolbar-btn { padding: var(--space-2) var(--space-3); }
            .content-inner { padding: var(--space-6) var(--space-4) var(--space-10); }
        }
    </style>
</head>
<body>

    <div class="reading-progress" id="readingProgress"></div>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="drag-overlay" id="dragOverlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Drop Markdown file here</span>
    </div>

    <!-- Toolbar -->
    <header class="toolbar">
        <!-- Moved Toggle Button near sidebar -->
        <button class="icon-btn" id="btnToggleSidebar" aria-label="Toggle Navigation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="toolbar-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span class="toolbar-logo-text">MarkdownReader</span>
            <span class="toolbar-logo-badge">v1.0.2</span>
        </div>

        <div class="toolbar-divider"></div>

        <button class="toolbar-btn primary" id="btnLoadFile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>Open File</span>
        </button>
        <input type="file" id="fileInput" accept=".md,.markdown,.mdx,.txt" style="display:none">

        <div class="url-input-group">
            <div class="url-input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <input type="url" class="url-input" id="urlInput" placeholder="Enter MD URL (e.g. GitHub raw...)" aria-label="URL to Markdown file">
            </div>
            <button class="toolbar-btn secondary" id="btnLoadUrl">Load</button>
        </div>

        <div class="toolbar-spacer"></div>

        <div class="file-badge" id="fileBadge" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span id="fileBadgeText">document.md</span>
        </div>

        <button class="icon-btn" id="themeToggle" aria-label="Toggle Theme">
            <!-- Icon set by JS -->
        </button>
    </header>

    <div class="app-body">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Contents</span>
                <button class="icon-btn" id="btnCollapseSidebar" aria-label="Collapse Sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
            </div>
            
            <div class="sidebar-search">
                <input type="search" class="sidebar-search-input" id="tocSearch" placeholder="Search headings..." aria-label="Search Table of Contents">
            </div>

            <nav class="sidebar-nav" id="tocNav">
                <div class="sidebar-empty" id="tocEmpty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    <p>Load a Markdown file to see the table of contents.</p>
                </div>
            </nav>

            <div class="resize-handle" id="resizeHandle"></div>
        </aside>

        <!-- Content Area -->
        <main class="content-area" id="contentArea">
            <div class="content-inner">
                <div id="welcomeState" class="welcome-state">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <h2 class="welcome-title">Open Markdown File</h2>
                    <p class="welcome-sub">Load a local .md file or enter a URL to start reading. You can also drag & drop files directly.</p>
                    <div class="welcome-actions">
                        <button class="toolbar-btn primary" onclick="document.getElementById('fileInput').click()">
                            Open Local File
                        </button>
                    </div>
                </div>

                <article class="md-body" id="mdContent" style="display:none"></article>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            'use strict';

            // ── State ──────────────────────────────────────────────────────
            let currentFileName = '';
            let sidebarCollapsed = false;
            let headings = [];

            // ── Elements ──────────────────────────────────────────────────
            const html = document.documentElement;
            const sidebar = document.getElementById('sidebar');
            const sidebarBackdrop = document.getElementById('sidebarBackdrop');
            const tocNav = document.getElementById('tocNav');
            const tocEmpty = document.getElementById('tocEmpty');
            const tocSearch = document.getElementById('tocSearch');
            const contentArea = document.getElementById('contentArea');
            const mdContent = document.getElementById('mdContent');
            const welcomeState = document.getElementById('welcomeState');
            const fileBadge = document.getElementById('fileBadge');
            const fileBadgeText = document.getElementById('fileBadgeText');
            const fileInput = document.getElementById('fileInput');
            const urlInput = document.getElementById('urlInput');
            const readingProgress = document.getElementById('readingProgress');
            const themeToggle = document.getElementById('themeToggle');

            // ── Marked Configuration ──────────────────────────────────────
            marked.setOptions({
                breaks: true,
                gfm: true,
            });

            const renderer = new marked.Renderer();

            // Custom heading renderer to generate IDs for TOC
            renderer.heading = function(token) {
                const text = token.text;
                const depth = token.depth;
                const id = token.raw.trim().toLowerCase()
                    .replace(/<[^>]+>/g, '')
                    .replace(/[^\w\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^-|-$/g, '');
                
                return `<h${depth} id="${id}">${text}</h${depth}>\n`;
            };

            // Code blocks with copy button
            renderer.code = function(token) {
                const code = token.text;
                const lang = token.lang || '';
                const escapedCode = code
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                
                return `
                    <div class="code-block-wrapper">
                        <pre><code class="language-${lang}">${escapedCode}</code></pre>
                        <button class="copy-btn" onclick="copyCode(this)" title="Copy Code">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            Copy
                        </button>
                    </div>`;
            };

            marked.use({ renderer });

            // ── Theme Management ──────────────────────────────────────────
            let currentTheme = 'dark';
            html.setAttribute('data-theme', currentTheme);

            function updateThemeIcon() {
                if (currentTheme === 'dark') {
                    themeToggle.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
                    themeToggle.setAttribute('aria-label', 'Switch to Light Mode');
                } else {
                    themeToggle.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
                    themeToggle.setAttribute('aria-label', 'Switch to Dark Mode');
                }
            }

            updateThemeIcon();

            themeToggle.addEventListener('click', () => {
                currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', currentTheme);
                updateThemeIcon();
            });

            // ── Sidebar Management ────────────────────────────────────────
            const btnToggleSidebar = document.getElementById('btnToggleSidebar');
            const btnCollapseSidebar = document.getElementById('btnCollapseSidebar');

            const isMobile = () => window.innerWidth <= 768;

            function toggleSidebar() {
                if (isMobile()) {
                    sidebar.classList.toggle('mobile-open');
                    sidebarBackdrop.classList.toggle('visible');
                } else {
                    sidebarCollapsed = !sidebarCollapsed;
                    sidebar.classList.toggle('collapsed', sidebarCollapsed);
                }
            }

            btnToggleSidebar.addEventListener('click', toggleSidebar);
            btnCollapseSidebar.addEventListener('click', toggleSidebar);
            sidebarBackdrop.addEventListener('click', () => {
                sidebar.classList.remove('mobile-open');
                sidebarBackdrop.classList.remove('visible');
            });

            // ── Sidebar Resize ──────────────────────────────────────────
            const resizeHandle = document.getElementById('resizeHandle');
            let isResizing = false;
            let startX, startWidth;

            resizeHandle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const newWidth = Math.min(Math.max(startWidth + (e.clientX - startX), 160), 480);
                sidebar.style.width = newWidth + 'px';
                sidebar.style.minWidth = 'unset';
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });

            // ── Reading Progress & TOC Sync ──────────────────────────────
            contentArea.addEventListener('scroll', () => {
                const scrollTop = contentArea.scrollTop;
                const scrollHeight = contentArea.scrollHeight - contentArea.clientHeight;
                const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
                readingProgress.style.width = progress + '%';
                updateActiveTocItem();
            });

            function updateActiveTocItem() {
                const scrollTop = contentArea.scrollTop + 80;
                let activeId = null;

                for (const h of headings) {
                    const el = document.getElementById(h.id);
                    if (el && el.offsetTop <= scrollTop) {
                        activeId = h.id;
                    }
                }

                document.querySelectorAll('.toc-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.id === activeId);
                });
            }

            // ── Markdown Rendering ────────────────────────────────────────
            function renderMarkdown(text, fileName) {
                currentFileName = fileName || 'document.md';
                fileBadgeText.textContent = currentFileName;
                fileBadge.style.display = 'inline-flex';
                welcomeState.style.display = 'none';
                mdContent.style.display = 'block';
                mdContent.innerHTML = marked.parse(text);
                
                buildToc();
                readingProgress.style.width = '0%';
                contentArea.scrollTo({ top: 0, behavior: 'instant' });
                showToast(`✓ "${currentFileName}" loaded`, 'success');
            }

            // ── TOC Generation ────────────────────────────────────────────
            function buildToc() {
                headings = [];
                const hNodes = mdContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
                hNodes.forEach(h => {
                    if (h.id) {
                        headings.push({
                            id: h.id,
                            text: h.textContent,
                            level: parseInt(h.tagName[1])
                        });
                    }
                });
                renderToc(headings);
            }

            function renderToc(items) {
                tocEmpty.style.display = items.length === 0 ? '' : 'none';
                
                // Clear existing items
                Array.from(tocNav.children).forEach(c => {
                    if (c !== tocEmpty) c.remove();
                });

                items.forEach(h => {
                    const btn = document.createElement('button');
                    btn.className = `toc-item h${h.level}`;
                    btn.dataset.id = h.id;
                    btn.setAttribute('aria-label', `Jump to: ${h.text}`);
                    btn.innerHTML = `<span class="toc-item-dot"></span><span class="toc-item-text">${escapeHtml(h.text)}</span>`;
                    
                    btn.addEventListener('click', () => {
                        const target = document.getElementById(h.id);
                        if (target) {
                            const offset = target.offsetTop - 24;
                            contentArea.scrollTo({ top: offset, behavior: 'smooth' });
                            
                            if (isMobile()) {
                                sidebar.classList.remove('mobile-open');
                                sidebarBackdrop.classList.remove('visible');
                            }
                        }
                    });
                    tocNav.appendChild(btn);
                });
            }

            // TOC Search Filter
            tocSearch.addEventListener('input', () => {
                const q = tocSearch.value.toLowerCase().trim();
                if (!q) {
                    renderToc(headings);
                    return;
                }
                renderToc(headings.filter(h => h.text.toLowerCase().includes(q)));
            });

            // ── File Loading (Local) ──────────────────────────────────────
            document.getElementById('btnLoadFile').addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                readFile(file);
                fileInput.value = '';
            });

            function readFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => renderMarkdown(e.target.result, file.name);
                reader.onerror = () => showToast('Error reading file.', 'error');
                reader.readAsText(file, 'UTF-8');
            }

            // ── File Loading (URL) ────────────────────────────────────────
            document.getElementById('btnLoadUrl').addEventListener('click', loadFromUrl);
            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') loadFromUrl();
            });

            async function loadFromUrl() {
                const url = urlInput.value.trim();
                if (!url) {
                    showToast('Please enter a URL.', 'error');
                    return;
                }

                welcomeState.style.display = 'none';
                mdContent.style.display = 'block';
                mdContent.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading file...</p></div>';

                try {
                    let fetchUrl = url;
                    // Auto-convert GitHub blob URLs to raw
                    if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
                        fetchUrl = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                    }

                    const res = await fetch(fetchUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const text = await res.text();
                    const fileName = url.split('/').pop().split('?')[0] || 'document.md';
                    renderMarkdown(text, fileName);
                } catch (err) {
                    mdContent.innerHTML = '';
                    welcomeState.style.display = '';
                    showToast(`Loading failed: ${err.message}. Try a Raw-URL.`, 'error');
                }
            }

            // ── Drag & Drop ──────────────────────────────────────────────
            const dragOverlay = document.getElementById('dragOverlay');
            let dragCounter = 0;

            document.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragCounter++;
                dragOverlay.classList.add('visible');
            });

            document.addEventListener('dragleave', () => {
                dragCounter--;
                if (dragCounter <= 0) {
                    dragCounter = 0;
                    dragOverlay.classList.remove('visible');
                }
            });

            document.addEventListener('dragover', (e) => e.preventDefault());

            document.addEventListener('drop', (e) => {
                e.preventDefault();
                dragCounter = 0;
                dragOverlay.classList.remove('visible');
                const files = e.dataTransfer.files;
                if (files.length > 0) readFile(files[0]);
            });

            // ── Copy Code Functionality ──────────────────────────────────
            window.copyCode = function(btn) {
                const code = btn.previousElementSibling.querySelector('code').textContent;
                navigator.clipboard.writeText(code).then(() => {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.innerHTML = orig;
                        btn.classList.remove('copied');
                    }, 2000);
                });
            };

            // ── Keyboard Shortcuts ────────────────────────────────────────
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                    e.preventDefault();
                    fileInput.click();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === '\\') {
                    e.preventDefault();
                    toggleSidebar();
                }
            });

            // ── UI Feedback (Toasts) ──────────────────────────────────────
            function showToast(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                
                const icon = type === 'success' 
                    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
                    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
                
                toast.innerHTML = `${icon}<span>${message}</span>`;
                container.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(16px)';
                    toast.style.transition = 'opacity 0.3s, transform 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, 3500);
            }

                return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
